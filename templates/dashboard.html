<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="Start your development with Creative Studio landing page.">
    <meta name="author" content="Devcrud">
    <title>Fin-Forge AI | Services</title>

    <!-- font icons -->
    <link rel="stylesheet" href="../static/vendors/themify-icons/css/themify-icons.css">

    <!-- Bootstrap + Creative Studio main styles -->
	<link rel="stylesheet" href="../static/css/creative-studio.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* Universal Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
    
        body {
            font-family: 'Roboto', sans-serif;
            background: url('/static/imgs/header.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
    
        /* Apply blur effect to background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.516); /* Dark overlay */
            backdrop-filter: blur(20px); /* Blurred background */
            z-index: -1; /* Ensure the overlay is behind the form */
        }
    
        /* Main container */
        .container {
            display: flex;
            height: 85vh; /* Full height of the viewport */
            width: 130vw;
            max-width: 1200px;
            background-color: rgba(185, 183, 183, 0.457); /* Light background for contrast */
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
            gap: 20px; /* Added gap between sidebar and charts container */
            margin-top: 60px;
            
        }
    
        /* Sidebar styles */
        .sidebar {
            width: 300px; /* Width of the sidebar */
            height: auto; /* Auto height for responsiveness */
            padding: 20px;
            background-color: rgba(51, 51, 51, 0.6); /* Semi-transparent background */
            color: white; /* Text color */
            border-radius: 25px; /* Rounded corners */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* Shadow for depth */
            margin-top: 90px;
            margin-bottom: 90px;
            margin-left: 20px;
        }
    
        .sidebar h1 {
            text-align: center; /* Centered title */
            margin-bottom: 30px; /* Space below title */
            font-size: 24px;
            font-weight: 500;
        }
    
        form {
            display: flex;
            flex-direction: column; /* Column layout for form elements */
        }
    
        input[type="number"],
        select {
            margin: 10px 0; /* Space between elements */
            padding: 15px; /* Padding inside inputs */
            border-radius: 20px; /* Rounded corners */
            border: 1px solid #dddddd2e; /* Light border */
            outline: none; /* Remove outline */
            transition: border 0.3s ease, box-shadow 0.3s ease; /* Transition for interactions */
            font-size: 16px; /* Font size */
        }
    
        input[type="number"]:focus,
        select:focus {
            border: 1px solid #e8224a; /* Focus border color */
            box-shadow: 0px 4px 10px rgba(76, 175, 80, 0.3); /* Shadow on focus */
        }





    
        .button-container {
    display: flex; /* Use flexbox for alignment */
    gap: 30px; /* Space between buttons */
    justify-content: center; /* Center buttons (optional) */
    margin-top: 50px; /* Optional: space from the top of the page */
}

button {
    padding: 15px 25px; /* Padding inside button */
    background-color: #e8224a; /* Button background color */
    color: white; /* Button text color */
    border: none;
    border-radius: 30px; /* Rounded corners */
    cursor: pointer; /* Pointer on hover */
    font-size: 16px; /* Font size */
    transition: background-color 0.3s ease, box-shadow 0.3s ease; /* Transition effects */
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); /* Shadow */
}

button:hover {
    background-color: #e64868; /* Darker red on hover */
    box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.15); /* Increased shadow on hover */
}






    
        /* Charts container */
        .charts {
    display: flex; /* Change to flex for side-by-side alignment */
    flex-direction: column; /* Stack items vertically */
    padding: 20px; /* Padding around charts */
}

table {
    width: 100%; /* Full width of the container */
    margin-bottom: 20px; /* Space below the table */
    border-collapse: collapse; /* Collapse borders */
    background: rgba(255, 255, 255, 0.8); /* Light background for contrast */
    border-radius: 30px; /* Rounded corners */
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Shadow for table */
}

th, td {
    padding: 10px; /* Padding for cells */
    text-align: center; /* Center text */
    border-bottom: 1px solid #ddd; /* Bottom border for rows */
    border-radius: 15px;
}

th {
    background-color: #e8224a; /* Header background color */
    color: white; /* Header text color */
}

tbody tr:hover {
    background-color: #f1f1f1; /* Highlight on hover */
}

/* Chart canvas styles */
.chart-container {
    display: flex; /* Flexbox for charts */
    justify-content: space-between; /* Space out charts evenly */
}

canvas {
    flex: 1; /* Allow charts to take equal space */
    height: 300px; /* Set a fixed height for the charts */
    margin: 0 10px; /* Space between charts */
    background: #fff; /* Background color for charts */
    border-radius: 30px; /* Rounded corners for charts */
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Shadow for charts */
    max-width: calc(50% - 20px); /* Ensure two charts fit side by side with margin */
}

nav {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: row;
    gap: 15px;
}

.btn-btn-primary {
    background-color: #007BFF;
    color: white;
    padding: 12px 18px;
    border-radius: 30px; /* Increased value for smoother and more pronounced curve */
    text-decoration: none;
    font-size: 1.1em;
    transition: background-color 0.3s ease, transform 0.3s;
}

.btn-btn-primary:hover {
    background-color: #0056b3;
    transform: translateY(-2px);
}


</style>
    
    
</head>
<body>
    <nav>
        <a class="btn btn-primary" href="/">Home</a>
        <a class="btn btn-primary" href="/stock">Stocks</a>
        <a class="btn btn-primary" href="/chatbot">Finbot</a>
        <a class="btn btn-primary" href="/dashboard">Tracker</a>
        <a class="btn btn-primary" href="/logout">Logout</a>
    </nav>
    <div class="container">
        <div class="sidebar">
            <h1>Tracker</h1>
            <form id="tracker-form">
                <input type="number" id="income" placeholder="Income" required>
                <input type="number" id="expenditure" placeholder="Expenditure" required>
                <select id="month" required>
                    <option value="" disabled selected>Select Month</option>
                    <option value="January">January</option>
                    <option value="February">February</option>
                    <option value="March">March</option>
                    <option value="April">April</option>
                    <option value="May">May</option>
                    <option value="June">June</option>
                    <option value="July">July</option>
                    <option value="August">August</option>
                    <option value="September">September</option>
                    <option value="October">October</option>
                    <option value="November">November</option>
                    <option value="December">December</option>
                </select>
                <button type="submit">Submit</button>
                <button type="submit">Insights</button>
            </form>
        </div>
    
        <div class="charts">
            <!-- Table to display user-entered data -->
            <table id="data-table">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Income</th>
                        <th>Expenditure</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data rows will be added here dynamically -->
                </tbody>
            </table>
    
            <!-- Chart canvases -->
            <div class="chart-container">
                <canvas id="donutChart"></canvas>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>
    
    
    

    <script src="script.js"></script>
    <script>
        const trackerForm = document.getElementById('tracker-form');
        const incomeInput = document.getElementById('income');
        const expenditureInput = document.getElementById('expenditure');
        const monthInput = document.getElementById('month');
        const dataTableBody = document.querySelector('#data-table tbody');
        
        let income = 0;
        let expenditure = 0;
        
        // Set up the donut and bar charts
        const donutCtx = document.getElementById('donutChart').getContext('2d');
        const barCtx = document.getElementById('barChart').getContext('2d');
    
        // Initialize charts
        const donutChart = new Chart(donutCtx, {
            type: 'doughnut',
            data: {
                labels: ['Income', 'Expenditure'],
                datasets: [{
                    label: 'Income and Expenditure',
                    data: [income, expenditure],
                    backgroundColor: ['#28a745', '#dc3545'],
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                }
            }
        });
        
        const barChart = new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: ['Income', 'Expenditure'],
                datasets: [{
                    label: 'Amounts',
                    data: [income, expenditure],
                    backgroundColor: ['#28a745', '#dc3545'],
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
        
        // Handle form submission
        trackerForm.addEventListener('submit', function (event) {
            event.preventDefault();
    
            const amountIncome = parseFloat(incomeInput.value);
            const amountExpenditure = parseFloat(expenditureInput.value);
            const month = monthInput.value;
    
            // Validate inputs
            if (!month) {
                alert('Please select a month.');
                return;
            }
    
            if (isNaN(amountIncome) || amountIncome < 0) {
                alert('Please enter a valid positive income amount.');
                return;
            }
    
            if (isNaN(amountExpenditure) || amountExpenditure < 0) {
                alert('Please enter a valid positive expenditure amount.');
                return;
            }
    
            // Update income and expenditure totals
            income += amountIncome;
            expenditure += amountExpenditure;
    
            // Update charts
            donutChart.data.datasets[0].data[0] = income;
            donutChart.data.datasets[0].data[1] = expenditure;
            donutChart.update();
    
            barChart.data.datasets[0].data[0] = income;
            barChart.data.datasets[0].data[1] = expenditure;
            barChart.update();
    
            // Add new data to the table
            const existingRow = Array.from(dataTableBody.rows).find(row => row.cells[0].innerText === month);
            if (existingRow) {
                // Update existing row if month already exists
                existingRow.cells[1].innerText = (parseFloat(existingRow.cells[1].innerText) + amountIncome).toFixed(2);
                existingRow.cells[2].innerText = (parseFloat(existingRow.cells[2].innerText) + amountExpenditure).toFixed(2);
            } else {
                // Create new row
                const newRow = dataTableBody.insertRow();
                newRow.insertCell(0).innerText = month;
                newRow.insertCell(1).innerText = amountIncome.toFixed(2);
                newRow.insertCell(2).innerText = amountExpenditure.toFixed(2);
            }
    
            // Reset form
            trackerForm.reset();
        });
    </script>
    
        
</body>
</html>
